# Blueprint Render: despliega la API Laravel con PostgreSQL
databases:
  - name: dwc-postgres
    plan: free
    region: oregon
    databaseName: dwc

services:
  - type: web
    name: dwc-laravel-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /up  # Comprueba que Laravel responde

    envVars:
      - key: APP_ENV
        value: production

      - key: APP_DEBUG
        value: "false"

      - key: APP_URL
        sync: false  # URL pública del servicio en Render

      - key: APP_KEY
        sync: false  # Clave de cifrado de Laravel

      - key: LOG_CHANNEL
        value: stderr

      - key: LOG_LEVEL
        value: warning

      - key: DB_CONNECTION
        value: pgsql

      - key: DATABASE_URL
        fromDatabase:
          name: dwc-postgres
          property: connectionString  # Conexión automática a Postgres

      - key: SESSION_DRIVER
        value: file

      - key: CACHE_STORE
        value: file

      - key: QUEUE_CONNECTION
        value: sync

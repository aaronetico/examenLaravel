# Blueprint para Render: API Laravel + Postgres.

databases:
  - name: dwc-postgres
    plan: free
    region: oregon
    databaseName: dwc

services:
  - type: web
    name: dwc-laravel-api
    startCommand: php artisan migrate --force && php artisan serve --host 0.0.0.0 --port 10000
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /up

    envVars:
      - key: APP_ENV
        value: production

      - key: APP_DEBUG
        value: "false"

      - key: APP_URL
        sync: false

      - key: APP_KEY
        sync: false

      - key: LOG_CHANNEL
        value: stderr

      - key: LOG_LEVEL
        value: warning

      - key: DB_CONNECTION
        value: pgsql

      - key: DATABASE_URL
        fromDatabase:
          name: dwc-postgres
          property: connectionString

      - key: SESSION_DRIVER
        value: file

      - key: CACHE_STORE
        value: file

      - key: QUEUE_CONNECTION
        value: sync

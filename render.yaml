# Blueprint para Render: API Laravel + Postgres.
# Conecta este archivo al crear el servicio desde el repo examenLaravelCopia.
# Genera APP_KEY en local: php artisan key:generate --show
databases:
  - name: dwc-postgres
    plan: free
    region: oregon
    databaseName: dwc

services:
  - type: web
    name: dwc-laravel-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /up
    preDeployCommand: php artisan migrate --force
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false
      - key: APP_KEY
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: LOG_LEVEL
        value: warning
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: dwc-postgres
          property: connectionString
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
